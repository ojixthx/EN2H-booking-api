version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: booking_platform_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: booking_platform
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: booking_platform_app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_TYPE=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=booking_platform
      - JWT_SECRET=change-this-in-production-docker-secret-access
      - JWT_EXPIRATION=15m
      - JWT_REFRESH_SECRET=change-this-in-production-docker-secret-refresh
      - JWT_REFRESH_EXPIRATION=7d
    depends_on:
      - db

volumes:
  postgres_data:
